[go-pttbbs]
HTTP_HOST = 0.0.0.0:3456

[go-pttbbs:api] # needs to be aligned with go-pttbbs
JWT_SECRET = jwt_secret # JWT secret
JWT_ISSUER = go-pttbbs  # JWT issuer
GUEST      = guest   # guest account

[go-pttbbs:cmbbs:path]
IS_DUP_BOARD_DIR_PATH = false

[go-pttbbs:types] # needs to be aligned with go-pttbbs
TIME_LOCATION = Asia/Taipei #timezone in location-format.

BIG5_TO_UTF8 = /etc/go-pttbbs/uao250-b2u.big5.txt
UTF8_TO_BIG5 = /etc/go-pttbbs/uao250-u2b.big5.txt
AMBCJK       = /etc/go-pttbbs/ambcjk.big5.txt

IS_ALL_GUEST = true

[go-pttbbs:ptttype]
SERVICE_MODE = DEV
